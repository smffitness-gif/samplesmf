<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<!-- ✅ MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BCAA</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* ===== NAVBAR ===== */
.navbar {
    background: #111;
    padding: 15px;
    font-size: 20px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    padding: 15px;
}

/* ===== CARD ===== */
.product-card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.product-card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    border-radius: 10px;
}

/* ===== DETAIL ===== */
.product-detail {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    margin: 20px auto;
}

/* ===== INPUT ===== */
input {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 5px;
    border: none;
}

/* ===== BUTTON ===== */
button {
    background: #ff6600;
    border: none;
    padding: 10px;
    color: white;
    margin: 10px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00c853;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 768px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .navbar { font-size: 16px; }
}

</style>
</head>

<body>

<nav class="navbar">
    <h2>BCAA</h2>
</nav>

<div id="grid" class="grid"></div>

<div id="detail" class="product-detail" style="display:none;">
    <img id="pimg">
    <h3 id="pname"></h3>
    <p id="pprice"></p>
    <ul id="pdesc"></ul>
    <button onclick="showOrder()">Order</button>
    <button onclick="backToGrid()">⬅ Back</button>
</div>

<div id="order" class="product-detail" style="display:none;">
    <h3>Order Form</h3>
    <img id="oimg">
    <h4 id="oname"></h4>
    <p id="oprice"></p>
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">
    <button onclick="orderNow()">Submit</button>
    <button onclick="backToDetail()">⬅ Back</button>
</div>

<script>

const products = [
  { name: "BCAA 1", price: 900, img: "img/bcaa1.jpg", desc: ["Muscle recovery", "Reduce fatigue", "Amino acids"] },
  { name: "BCAA 2", price: 1000, img: "img/bcaa2.jpg", desc: ["Hydration", "Strength", "Muscle support"] },
  { name: "BCAA 3", price: 1100, img: "img/bcaa3.jpg", desc: ["Energy", "Recovery", "Focus"] },
  { name: "BCAA 4", price: 1200, img: "img/bcaa4.jpg", desc: ["Muscle growth", "Endurance", "Pump"] },
  { name: "BCAA 5", price: 1300, img: "img/bcaa5.jpg", desc: ["Fast absorption", "Strength", "Recovery"] },
  { name: "BCAA 6", price: 1400, img: "img/bcaa6.jpg", desc: ["Premium quality", "Energy", "Muscle support"] },
  { name: "BCAA 7", price: 1500, img: "img/bcaa7.jpg", desc: ["Boost performance", "Recovery", "Strength"] },
  { name: "BCAA 8", price: 1600, img: "img/bcaa8.jpg", desc: ["Endurance", "Energy", "Pump"] },
  { name: "BCAA 9", price: 1700, img: "img/bcaa9.jpg", desc: ["Muscle support", "Focus", "Strength"] },
  { name: "BCAA 10", price: 1800, img: "img/bcaa10.jpg", desc: ["Recovery", "Energy", "Premium"] }
];

const grid = document.getElementById("grid");

products.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "product-card";
    div.innerHTML = `
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
    `;
    div.onclick = () => showDetail(i);
    grid.appendChild(div);
});

let currentProduct = null;

function showDetail(i) {
    currentProduct = products[i];

    document.getElementById("pimg").src = currentProduct.img;
    document.getElementById("pname").innerText = currentProduct.name;
    document.getElementById("pprice").innerText = "₹" + currentProduct.price;

    const ul = document.getElementById("pdesc");
    ul.innerHTML = "";
    currentProduct.desc.forEach(d => {
        const li = document.createElement("li");
        li.innerText = d;
        ul.appendChild(li);
    });

    grid.style.display = "none";
    document.getElementById("detail").style.display = "block";
}

function backToGrid() {
    document.getElementById("detail").style.display = "none";
    grid.style.display = "grid";
}

function showOrder() {
    document.getElementById("oimg").src = currentProduct.img;
    document.getElementById("oname").innerText = currentProduct.name;
    document.getElementById("oprice").innerText = "₹" + currentProduct.price;

    document.getElementById("detail").style.display = "none";
    document.getElementById("order").style.display = "block";
}

function backToDetail() {
    document.getElementById("order").style.display = "none";
    document.getElementById("detail").style.display = "block";
}

function orderNow() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;

    if (!name || !phone || !email) {
        alert("Fill all fields!");
        return;
    }

    const msg = `Order:%0AProduct: ${currentProduct.name}%0APrice: ₹${currentProduct.price}%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}`;

    window.open(`https://api.whatsapp.com/send?phone=917339563621&text=${msg}`, "_blank");
}

</script>

</body>
</html>
