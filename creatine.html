<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<!-- ✅ MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creatine Products</title>

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* ===== NAVBAR ===== */
.navbar {
    background: #111;
    padding: 15px;
    font-size: 20px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    padding: 15px;
}

/* ===== CARD ===== */
.product-card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.product-card:hover {
    transform: scale(1.05);
}

.product-card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    border-radius: 10px;
}

/* ===== DETAIL ===== */
.product-detail {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    margin: 20px auto;
}

.product-detail img {
    width: 100%;
    border-radius: 10px;
}

/* ===== INPUT ===== */
input {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 5px;
    border: none;
}

/* ===== BUTTON ===== */
button {
    background: #ff6600;
    border: none;
    padding: 10px;
    color: white;
    margin: 8px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00c853;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 480px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .navbar {
        font-size: 16px;
    }
}

</style>
</head>

<body>

<nav class="navbar">
    <h2>Creatine</h2>
</nav>

<div id="grid" class="grid"></div>

<div id="detail" class="product-detail" style="display:none;">
    <img id="pimg">
    <h3 id="pname"></h3>
    <p id="pprice"></p>
    <ul id="pdesc"></ul>
    <button onclick="showOrder()">Order</button>
    <button onclick="backToGrid()">⬅ Back</button>
</div>

<div id="order" class="product-detail" style="display:none;">
    <h3>Order Form</h3>
    <img id="oimg">
    <h4 id="oname"></h4>
    <p id="oprice"></p>
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">
    <button onclick="orderNow()">Submit</button>
    <button onclick="backToDetail()">⬅ Back</button>
</div>

<script>

const products = [
  { name: "Creatine 1", price: 1000, img: "img/creatine1.jpg", desc: ["Supports strength", "Muscle energy", "Quality"] },
  { name: "Creatine 2", price: 1100, img: "img/creatine2.jpg", desc: ["Improves performance", "Boosts power", "Fast absorption"] },
  { name: "Creatine 3", price: 1200, img: "img/creatine3.jpg", desc: ["Muscle recovery", "Strength", "Premium"] },
  { name: "Creatine 4", price: 1300, img: "img/creatine4.jpg", desc: ["Energy boost", "Muscle support", "Tasty"] },
  { name: "Creatine 5", price: 1400, img: "img/creatine5.jpg", desc: ["High quality", "Endurance", "Strength"] },
  { name: "Creatine 6", price: 1500, img: "img/creatine6.jpg", desc: ["Fast absorption", "Muscle energy", "Performance"] },
  { name: "Creatine 7", price: 1600, img: "img/creatine7.jpg", desc: ["Premium", "Recovery", "Boost"] },
  { name: "Creatine 8", price: 1700, img: "img/creatine8.jpg", desc: ["Strength", "Energy", "Muscle"] },
  { name: "Creatine 9", price: 1800, img: "img/creatine9.jpg", desc: ["Quality", "Endurance", "Power"] },
  { name: "Creatine 10", price: 1900, img: "img/creatine10.jpg", desc: ["Recovery", "Muscle growth", "Fast absorption"] }
];

const grid = document.getElementById("grid");

products.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "product-card";
    div.innerHTML = `
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
    `;
    div.onclick = () => showDetail(i);
    grid.appendChild(div);
});

let currentProduct = null;

function showDetail(i) {
    currentProduct = products[i];

    document.getElementById("pimg").src = currentProduct.img;
    document.getElementById("pname").innerText = currentProduct.name;
    document.getElementById("pprice").innerText = "₹" + currentProduct.price;

    const ul = document.getElementById("pdesc");
    ul.innerHTML = "";

    currentProduct.desc.forEach(d => {
        const li = document.createElement("li");
        li.innerText = d;
        ul.appendChild(li);
    });

    grid.style.display = "none";
    document.getElementById("detail").style.display = "block";
}

function backToGrid() {
    document.getElementById("detail").style.display = "none";
    grid.style.display = "grid";
}

function showOrder() {
    document.getElementById("oimg").src = currentProduct.img;
    document.getElementById("oname").innerText = currentProduct.name;
    document.getElementById("oprice").innerText = "₹" + currentProduct.price;

    document.getElementById("detail").style.display = "none";
    document.getElementById("order").style.display = "block";
}

function backToDetail() {
    document.getElementById("order").style.display = "none";
    document.getElementById("detail").style.display = "block";
}

function orderNow() {
    const name = encodeURIComponent(document.getElementById("name").value.trim());
    const phone = encodeURIComponent(document.getElementById("phone").value.trim());
    const email = encodeURIComponent(document.getElementById("email").value.trim());

    if (!name || !phone || !email) {
        alert("Please fill all fields!");
        return;
    }

    const msg = `Order:%0AProduct: ${encodeURIComponent(currentProduct.name)}%0APrice: ₹${currentProduct.price}%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}`;

    window.open(`https://api.whatsapp.com/send?phone=917339563621&text=${msg}`, "_blank");
}

</script>

</body>
</html>
