    <style>
        /* ===== GLOBAL ===== */
        body {
            background-color: black;
            color: white;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* ===== NAVBAR ===== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: black;
        }

        nav h1 {
            font-size: 20px;
            margin: 0;
        }

        /* ===== MENU ICON ===== */
        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            display: none;
        }

        /* ===== MENU ===== */
        .menu {
            display: flex;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        /* ===== LOGO ===== */
        .logo img {
            width: 120px;
            margin-top: 10px;
        }

        /* ===== SOCIAL LINKS ===== */
        .link {
            width: 90%;
            max-width: 400px;
            margin: auto;
        }

        .link a {
            display: block;
            padding: 15px;
            margin: 10px 0;
            background: #111;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .link img {
            height: 20px;
            margin-bottom: 5px;
        }

        /* ===== HAMBURGER LOGIC ===== */
        #menu-toggle {
            display: none;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {

            nav h1 {
                font-size: 16px;
            }

            /* Show hamburger */
            .menu-icon {
                display: block;
            }

            /* Hide menu by default */
            .menu {
                display: none;
                flex-direction: column;
                background: #111;
                position: absolute;
                top: 60px;
                right: 0;
                width: 200px;
                text-align: center;
                border-radius: 10px;
            }

            /* Show when checked */
            #menu-toggle:checked+.menu {
                display: flex;
            }

            .menu a {
                padding: 15px;
                border-bottom: 1px solid #333;
            }

            /* Logo smaller */
            .logo img {
                width: 90px;
            }

            /* Social buttons */
            .link a {
                font-size: 14px;
                padding: 12px;
            }
        }

        /* ===== SMALL MOBILE ===== */
        @media (max-width: 480px) {
            nav h1 {
                font-size: 14px;
            }

            .logo img {
                width: 80px;
            }
        }
    </style>
    </head>
