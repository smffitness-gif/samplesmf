<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- ✅ FIXED -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Whey Protein</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        .navbar {
            background: #111;
            padding: 15px;
            text-align: center;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .product-card {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* ===== DETAIL ===== */
        .product-detail {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            margin: 20px auto;
            text-align: center;
        }

        .product-detail img {
            width: 100%;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #ff6600;
            border: none;
            padding: 10px;
            color: white;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00c853;
        }

        /* ===== RESPONSIVE ===== */

        /* Tablet */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .navbar h2 {
                font-size: 16px;
            }
        }
    </style>

</head>

<body>

    <nav class="navbar">
        <h2>Whey Protein</h2>
    </nav>

    <div id="grid" class="grid"></div>

    <div id="detail" class="product-detail" style="display:none;">
        <img id="pimg">
        <h3 id="pname"></h3>
        <p id="pprice"></p>
        <ul id="pdesc"></ul>
        <button onclick="showOrder()">Order</button>
        <button onclick="backToGrid()">⬅ Back</button>
    </div>

    <div id="order" class="product-detail" style="display:none;">
        <h3>Order Form</h3>
        <img id="oimg">
        <h4 id="oname"></h4>
        <p id="oprice"></p>
        <input id="name" placeholder="Name">
        <input id="phone" placeholder="Phone">
        <input id="email" placeholder="Email">
        <button onclick="orderNow()">Submit</button>
        <button onclick="backToDetail()">⬅ Back</button>
    </div>

    <script>
        const products = [
            { name: "Whey 1", price: 1200, img: "img/whey1.jpg", desc: ["High quality", "Muscle growth", "Tasty"] },
            { name: "Whey 2", price: 1300, img: "img/whey2.jpg", desc: ["Premium whey", "Boost recovery", "Rich protein"] },
            { name: "Whey 3", price: 1400, img: "img/whey3.jpg", desc: ["Fast absorption", "Strength", "Delicious"] },
            { name: "Whey 4", price: 1500, img: "img/whey4.jpg", desc: ["Powerful", "Recovery", "Amino rich"] },
            { name: "Whey 5", price: 1600, img: "img/whey5.jpg", desc: ["Tasty flavor", "Muscle support", "High protein"] }
        ];

        const grid = document.getElementById("grid");

        products.forEach((p, i) => {
            const div = document.createElement("div");
            div.className = "product-card";
            div.innerHTML = `
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <p>₹${p.price}</p>
            `;
            div.onclick = () => showDetail(i);
            grid.appendChild(div);
        });

        let currentProduct;

        function showDetail(i) {
            currentProduct = products[i];
            document.getElementById("grid").style.display = "none";
            document.getElementById("detail").style.display = "block";

            pimg.src = currentProduct.img;
            pname.innerText = currentProduct.name;
            pprice.innerText = "₹" + currentProduct.price;

            const ul = document.getElementById("pdesc");
            ul.innerHTML = "";
            currentProduct.desc.forEach(d => {
                const li = document.createElement("li");
                li.innerText = d;
                ul.appendChild(li);
            });
        }

        function backToGrid() {
            detail.style.display = "none";
            grid.style.display = "grid";
        }

        function showOrder() {
            detail.style.display = "none";
            order.style.display = "block";

            oimg.src = currentProduct.img;
            oname.innerText = currentProduct.name;
            oprice.innerText = "₹" + currentProduct.price;
        }

        function backToDetail() {
            order.style.display = "none";
            detail.style.display = "block";
        }

        function orderNow() {
            const name = nameInput.value.trim();
            const phone = phoneInput.value.trim();
            const email = emailInput.value.trim();

            if (!name || !phone || !email) {
                alert("Fill all fields!");
                return;
            }

            const msg = `Order:%0AProduct: ${currentProduct.name}%0APrice: ₹${currentProduct.price}%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}`;

            window.open(`https://api.whatsapp.com/send?phone=917339563621&text=${msg}`, "_blank");
        }
    </script>

</body>

</html>
